version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Entering frontend folder"
        - cd mock-interview-frontend
        - npm install
    build:
      commands:
        - echo "Building Vite app"
        - npm run build
  artifacts:
    baseDirectory: mock-interview-frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - mock-interview-frontend/node_modules/**/*